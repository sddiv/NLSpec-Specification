syntax = "proto3";

package nlspec;

option java_package = "com.nlspec.proto";
option go_package = "github.com/nlspec/proto";

// ─── NLSpec gRPC Service ────────────────────────────────────────────────
//
// gRPC interface for programmatic access to the nlspec server.
// High-throughput spec queries, graph traversal, version checks.
// MCP tools serve interactive agent use; gRPC serves internal consumers.
//
// Port: 50060

service NLSpecService {
  // ─── Bootstrap operations (CRUD + search) ───

  // Get a spec by ID within a namespace
  rpc GetSpec (GetSpecRequest) returns (GetSpecResponse);

  // List all specs in a namespace
  rpc ListSpecs (ListSpecsRequest) returns (ListSpecsResponse);

  // Get a specific element by ID
  rpc GetElement (GetElementRequest) returns (GetElementResponse);

  // Search elements by text, type, or reference
  rpc SearchElements (SearchRequest) returns (SearchResponse);

  // Query elements with structured filters
  rpc QueryElements (QueryRequest) returns (QueryResponse);

  // ─── Namespace operations ───

  // List all namespaces
  rpc ListNamespaces (ListNamespacesRequest) returns (ListNamespacesResponse);

  // Import a spec into a namespace
  rpc ImportSpec (ImportSpecRequest) returns (ImportSpecResponse);

  // ─── Context slicing ───

  // Get minimal context for a bug fix or feature
  rpc Slice (SliceRequest) returns (SliceResponse);

  // ─── Validation ───

  // Validate a spec's structural integrity
  rpc Validate (ValidateRequest) returns (ValidateResponse);

  // ─── Graph operations ───

  // Get dependency graph for a spec or element
  rpc GetGraph (GraphRequest) returns (GraphResponse);

  // Get substrate topology
  rpc GetSubstrateGraph (SubstrateGraphRequest) returns (SubstrateGraphResponse);

  // Resolve a substrate chain (linear spec sequence for agent consumption)
  rpc ResolveSubstrateChain (SubstrateChainRequest) returns (SubstrateChainResponse);

  // ─── Patch operations ───

  // List patches for a spec
  rpc ListPatches (ListPatchesRequest) returns (ListPatchesResponse);

  // ─── Drift detection ───

  // Compare spec declarations against code surface
  rpc CheckDrift (DriftRequest) returns (DriftResponse);

  // ─── Version info ───

  // Get version hash for a specific element (used by spec-align markers)
  rpc GetElementVersion (ElementVersionRequest) returns (ElementVersionResponse);

  // Get version hashes for multiple elements in batch
  rpc GetElementVersionsBatch (ElementVersionBatchRequest) returns (ElementVersionBatchResponse);
}

// ─── Common Types ───────────────────────────────────────────────────────

message Timestamp {
  int64 unix_ms = 1;
}

enum ElementType {
  ELEMENT_TYPE_UNSPECIFIED = 0;
  ELEMENT_TYPE_RECORD = 1;
  ELEMENT_TYPE_FUNCTION = 2;
  ELEMENT_TYPE_SCENARIO = 3;
  ELEMENT_TYPE_ERROR = 4;
  ELEMENT_TYPE_INVARIANT = 5;
  ELEMENT_TYPE_ENUM = 6;
  ELEMENT_TYPE_CONFIG = 7;
  ELEMENT_TYPE_TOOL = 8;
  ELEMENT_TYPE_IMPORT = 9;
}

enum ReferenceType {
  REFERENCE_TYPE_UNSPECIFIED = 0;
  REFERENCE_TYPE_USES = 1;
  REFERENCE_TYPE_USED_BY = 2;
  REFERENCE_TYPE_THROWS = 3;
  REFERENCE_TYPE_IMPORT = 4;
  REFERENCE_TYPE_TAGGED = 5;
}

// ─── Spec & Element Messages ────────────────────────────────────────────

message SpecSummary {
  string id = 1;
  string name = 2;
  string version = 3;
  string namespace = 4;
  string path = 5;
  string parse_mode = 6;                   // "strict" or "loose"
  repeated string section_names = 7;
  int32 element_count = 8;
  Timestamp updated_at = 9;
}

message SpecElement {
  string id = 1;                           // "namespace/spec_id:section:type:name"
  string spec_id = 2;
  string namespace = 3;
  string section = 4;
  ElementType element_type = 5;
  string name = 6;
  string content = 7;
  repeated string tags = 8;
  repeated Reference references = 9;
  string raw_markdown = 10;
  string version_hash = 11;               // SHA-256 first 6 hex chars of normalized content
}

message Reference {
  string from_element = 1;
  string to_element = 2;
  ReferenceType ref_type = 3;
}

message Section {
  string id = 1;
  string spec_id = 2;
  string name = 3;
  string title = 4;
  repeated SpecElement elements = 5;
}

// ─── Bootstrap Requests/Responses ───────────────────────────────────────

message GetSpecRequest {
  string namespace = 1;
  string spec_id = 2;
}

message GetSpecResponse {
  SpecSummary spec = 1;
  repeated Section sections = 2;
}

message ListSpecsRequest {
  string namespace = 1;
}

message ListSpecsResponse {
  repeated SpecSummary specs = 1;
}

message GetElementRequest {
  string element_id = 1;                   // fully qualified ID
}

message GetElementResponse {
  SpecElement element = 1;
}

message SearchRequest {
  string query = 1;                        // text search query
  optional string namespace = 2;
  optional string spec_id = 3;
  optional ElementType element_type = 4;
  int32 limit = 5;                         // default: 20
}

message SearchResponse {
  repeated SearchResult results = 1;
}

message SearchResult {
  SpecElement element = 1;
  float score = 2;
  string match_context = 3;               // snippet showing where the match occurred
}

message QueryRequest {
  string namespace = 1;
  optional string spec_id = 2;
  optional string section = 3;
  optional ElementType element_type = 4;
  optional string name_pattern = 5;        // glob pattern on element name
  optional string references_element = 6;  // elements that reference this ID
  optional string referenced_by = 7;       // elements referenced by this ID
  int32 limit = 8;
}

message QueryResponse {
  repeated SpecElement elements = 1;
  int32 total_count = 2;
}

// ─── Namespace Requests/Responses ───────────────────────────────────────

message ListNamespacesRequest {}

message ListNamespacesResponse {
  repeated NamespaceSummary namespaces = 1;
}

message NamespaceSummary {
  string name = 1;
  repeated string spec_ids = 2;
  Timestamp created_at = 3;
}

message ImportSpecRequest {
  string namespace = 1;
  string spec_id = 2;
  string path = 3;                         // filesystem path to .md file
}

message ImportSpecResponse {
  SpecSummary spec = 1;
  NamespaceSummary namespace = 2;
  int32 element_count = 3;
}

// ─── Context Slice ──────────────────────────────────────────────────────

message SliceRequest {
  string namespace = 1;
  string spec_id = 2;
  optional int32 scenario = 3;
  optional string section = 4;
  string format = 5;                       // "json" or "markdown"
}

message SliceResponse {
  ContextSlice slice = 1;
  optional string markdown = 2;           // populated if format="markdown"
}

message ContextSlice {
  string trigger = 1;
  repeated SpecElement elements = 2;
  int32 total_lines = 3;
  repeated string specs_touched = 4;
  repeated string trace = 5;
}

// ─── Validation ─────────────────────────────────────────────────────────

message ValidateRequest {
  string namespace = 1;
  string spec_id = 2;
}

message ValidateResponse {
  string namespace = 1;
  string spec_id = 2;
  string parse_mode = 3;
  bool is_valid = 4;
  repeated ValidationError errors = 5;
  repeated ValidationWarning warnings = 6;
  GapReport gaps = 7;
}

message ValidationError {
  string element_id = 1;
  string error_type = 2;
  string message = 3;
}

message ValidationWarning {
  string element_id = 1;
  string warning_type = 2;
  string message = 3;
}

message GapReport {
  string spec_id = 1;
  string mode = 2;
  repeated Gap critical = 3;
  repeated Gap warnings = 4;
  repeated Gap info = 5;
  float completeness = 6;
}

message Gap {
  string severity = 1;
  string code = 2;
  string message = 3;
  optional string section = 4;
  repeated string elements = 5;
  string suggestion = 6;
}

// ─── Graph ──────────────────────────────────────────────────────────────

message GraphRequest {
  optional string namespace = 1;
  optional string spec_id = 2;
  optional string element_id = 3;
  int32 depth = 4;                         // default: 2
  string direction = 5;                    // "outgoing", "incoming", "both"
}

message GraphResponse {
  repeated GraphNode nodes = 1;
  repeated GraphEdge edges = 2;
}

message GraphNode {
  string id = 1;
  ElementType type = 2;
  string name = 3;
  string namespace = 4;
}

message GraphEdge {
  string from_id = 1;
  string to_id = 2;
  ReferenceType ref_type = 3;
}

// ─── Substrate ──────────────────────────────────────────────────────────

message SubstrateGraphRequest {
  string namespace = 1;
}

message SubstrateGraphResponse {
  repeated SubstrateNode nodes = 1;
  repeated SubstrateEdge edges = 2;
}

message SubstrateNode {
  string spec_id = 1;
  string name = 2;
  int32 layer = 3;
  bool is_branch_point = 4;
  repeated string children = 5;
}

message SubstrateEdge {
  string from_spec = 1;
  string to_spec = 2;
  string relationship = 3;                 // "derives_from", "composes_with"
}

message SubstrateChainRequest {
  string namespace = 1;
  string leaf_spec_id = 2;                 // start from this spec and walk up
}

message SubstrateChainResponse {
  repeated string chain = 1;               // ordered from root to leaf
  repeated SubstrateNode nodes = 2;
}

// ─── Patches ────────────────────────────────────────────────────────────

message ListPatchesRequest {
  optional string namespace = 1;
  optional string spec_id = 2;
  optional string status = 3;             // "ACTIVE", "ABSORBED", "REJECTED"
}

message ListPatchesResponse {
  repeated PatchSummary patches = 1;
}

message PatchSummary {
  string id = 1;
  string namespace = 2;
  string spec_id = 3;
  string category = 4;
  string status = 5;
  string description = 6;
  Timestamp created_at = 7;
}

// ─── Drift Detection ────────────────────────────────────────────────────

message DriftRequest {
  string namespace = 1;
  string spec_id = 2;
  CodeSurface code_surface = 3;
}

message CodeSurface {
  repeated CodeEndpoint endpoints = 1;
  repeated CodeRecord records = 2;
  repeated CodeError errors = 3;
  repeated CodeConfig configs = 4;
}

message CodeEndpoint {
  string method = 1;
  string path = 2;
  repeated string params = 3;
}

message CodeRecord {
  string name = 1;
  repeated CodeField fields = 2;
}

message CodeField {
  string name = 1;
  string type = 2;
}

message CodeError {
  string name = 1;
  string code = 2;
}

message CodeConfig {
  string key = 1;
  string type = 2;
  string default_value = 3;
}

message DriftResponse {
  string spec_id = 1;
  bool clean = 2;
  repeated DriftItem drifts = 3;
}

message DriftItem {
  string category = 1;                    // "endpoint", "record", "error", "config"
  string element = 2;
  string drift_type = 3;                  // "missing_in_code", "missing_in_spec", "mismatch"
  string spec_declares = 4;
  string code_has = 5;
}

// ─── Version Info ───────────────────────────────────────────────────────

message ElementVersionRequest {
  string element_id = 1;
}

message ElementVersionResponse {
  string element_id = 1;
  string version_hash = 2;                // SHA-256 first 6 hex chars
  string git_commit = 3;                  // latest git commit that changed this element's file
  Timestamp last_modified = 4;
}

message ElementVersionBatchRequest {
  repeated string element_ids = 1;
}

message ElementVersionBatchResponse {
  repeated ElementVersionResponse versions = 1;
}
